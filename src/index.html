<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="A colorful TV kids game that plays cheerful alphabet and number jingles."
    />
    <meta name="theme-color" content="#6c4dff" />
    <title>Emma Letters</title>
    <link rel="manifest" href="site.webmanifest" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="game-shell" aria-labelledby="game-title">
      <section class="hero">
        <div class="hero-copy">
          <p class="eyebrow">Tiny TV Jingle Box</p>
          <h1 id="game-title">Press a letter or number!</h1>
          <p class="lede">
            Tap a tile, use a keyboard, or let the remote send keys from
            <strong>A-Z</strong> and <strong>0-9</strong>.
          </p>
        </div>

        <div class="stage" aria-live="polite">
          <div class="stage-rings" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
          </div>
          <div class="mascot" aria-hidden="true">
            <span class="mascot-face">♪</span>
          </div>
          <p class="now-label">Now playing</p>
          <p class="now-key" id="now-key">Ready?</p>
          <p class="now-caption" id="now-caption">Pick any button to start the music.</p>
        </div>
      </section>

      <section class="controls" aria-label="Jingle buttons">
        <div class="button-grid" id="button-grid"></div>
      </section>

      <section class="tips" aria-label="Game tips">
        <p>
          Tip: on a TV or kiosk, keep this page focused and every supported key
          press becomes a jingle.
        </p>
        <button class="mute-button" id="mute-button" type="button" aria-pressed="false">
          Sound on
        </button>
      </section>
    </main>

    <script src="app.js" type="module"></script>
  </body>
</html>
