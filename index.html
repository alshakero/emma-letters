<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="A colorful TV kids game for Emma that jumps through an alphabet song with the keyboard."
    />
    <meta name="theme-color" content="#6c4dff" />
    <title>Emma Letters</title>
    <link rel="manifest" href="site.webmanifest" />
    <link rel="stylesheet" href="styles.bee07b31ff.css" />
  </head>
  <body>
    <main class="game-shell" aria-labelledby="game-title">
      <section class="hero">
        <div class="hero-copy">
          <p class="visually-hidden">Emma is pictured in the background holding her bunny.</p>
          <p class="eyebrow">Emma’s Alphabet TV</p>
          <h1 id="game-title">Emma, press a letter!</h1>
          <p class="lede">
            Emma is in the picture, and her keyboard controls the song. Press
            <strong>A-Z</strong> to jump to that letter.
          </p>
        </div>

        <div class="stage" aria-live="polite">
          <div class="stage-rings" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
          </div>
          <div class="video-frame" aria-label="Alphabet song video">
            <div id="youtube-player"></div>
            <p class="player-status" id="player-status">Loading alphabet song…</p>
          </div>
          <div class="play-copy">
            <p class="now-label">Now playing</p>
            <p class="now-key" id="now-key">A-Z</p>
            <p class="now-caption" id="now-caption">Emma, press any letter on your keyboard.</p>
          </div>
        </div>
      </section>
    </main>

    <script src="app.616575fd5c.js" type="module"></script>
  </body>
</html>
