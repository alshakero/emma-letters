<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="A colorful TV kids game that plays cheerful alphabet and number jingles."
    />
    <meta name="theme-color" content="#6c4dff" />
    <title>Emma Letters</title>
    <link rel="manifest" href="site.webmanifest" />
    <link rel="stylesheet" href="styles.0f839a8aba.css" />
  </head>
  <body>
    <main class="game-shell" aria-labelledby="game-title">
      <section class="hero">
        <div class="hero-copy">
          <p class="visually-hidden">Emma is pictured in the background holding her bunny.</p>
          <p class="eyebrow">Emma’s TV Jingle Box</p>
          <h1 id="game-title">Emma, press a key!</h1>
          <p class="lede">
            Use the keyboard for letters <strong>A-Z</strong> and numbers
            <strong>0-9</strong>. Every key starts a happy little jingle.
          </p>
        </div>

        <div class="stage" aria-live="polite">
          <div class="stage-rings" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
          </div>
          <div class="mascot" aria-hidden="true">
            <span class="mascot-face">♪</span>
          </div>
          <p class="now-label">Now playing</p>
          <p class="now-key" id="now-key">Ready?</p>
          <p class="now-caption" id="now-caption">Emma, press any letter or number on your keyboard.</p>
        </div>
      </section>
    </main>

    <script src="app.dbb666a2a3.js" type="module"></script>
  </body>
</html>
